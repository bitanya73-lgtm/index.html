<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web PRAROZ - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body, header, ul, ul li a, .action-button {
            border-radius: 0.5rem;
        }

        body {
            background-image: url('football.jpg.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        header {
            background-color: rgba(0, 0, 0, 0.6);
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        ul {
            position: absolute;
            top: 30px;
            right: 40px;
            list-style-type: none;
            font-size: 16px;
        }

        ul li {
            display: inline-block;
            margin-left: 15px;
        }

        ul li a {
            text-decoration: none;
            color: #fff;
            padding: 6px 12px;
            border: 1px solid transparent;
            transition: 0.3s ease;
        }

        ul li a:hover {
            background-color: #fff;
            color: #000;
        }

        .title {
            text-align: center;
            z-index: 10;
            position: relative;
            margin-bottom: 20px;
        }

        .title h1 {
            color: #fff;
            font-size: 64px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            z-index: 10;
            flex-wrap: wrap;
        }

        .action-button {
            background-color: #4CAF50;
            color: white;
            padding: 15px 30px;
            border: none;
            cursor: pointer;
            font-size: 24px;
            border-radius: 0.75rem;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            min-width: 250px;
            text-align: center;
        }

        .action-button:hover {
            background-color: #45a049;
            transform: translateY(-2px);
        }

        @keyframes emoji-firework {
            0% {
                transform: scale(0.5);
                opacity: 1;
            }
            100% {
                transform: translate(var(--final-x), var(--final-y)) scale(1.2);
                opacity: 0;
            }
        }

        .emoji-particle {
            position: absolute;
            font-size: 30px;
            pointer-events: none;
            z-index: 5;
        }

        @media (max-width: 768px) {
            header {
                justify-content: flex-start;
                padding-top: 80px;
            }

            ul {
                position: absolute;
                top: 20px;
                right: 0;
                left: 0;
                margin: 0 auto;
                text-align: center;
                width: 100%;
                padding: 0 10px;
            }

            ul li {
                display: inline-block;
                margin: 5px;
            }

            .title h1 {
                font-size: 48px;
            }

            .button-container {
                flex-direction: column;
                gap: 15px;
                align-items: center;
            }

            .action-button {
                font-size: 20px;
                padding: 12px 25px;
                min-width: unset;
                width: 80%;
            }
        }

        @media (max-width: 480px) {
            .title h1 {
                font-size: 36px;
            }

            ul {
                top: 10px;
            }

            ul li {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="main">
            <ul>
                <li><a href="Home.html">Home</a></li>
                <li><a href="ClubInfo.html">Club Info</a></li>
                <li><a href="MatchCenter.html">Match Center</a></li>
                <li><a href="News.html">News</a></li>
                <li><a href="Team.html">Team</a></li>
            </ul>
        </div>

        <div class="title">
            <h1>Football For A Better Future</h1>
            <div class="button-container">
                <button class="action-button" id="playFootballButton">Let's Play Football</button>
            </div>
        </div>
    </header>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const playButton = document.getElementById('playFootballButton');
            const header = document.querySelector('header');

            playButton.addEventListener('click', () => {
                const buttonRect = playButton.getBoundingClientRect();
                const headerRect = header.getBoundingClientRect();

                const startX = (buttonRect.left + buttonRect.width / 2) - headerRect.left;
                const startY = (buttonRect.top + buttonRect.height / 2) - headerRect.top;

                const numberOfEmojis = 30;
                const emoji = '⚽';

                for (let i = 0; i < numberOfEmojis; i++) {
                    const particle = document.createElement('span');
                    particle.classList.add('emoji-particle');
                    particle.textContent = emoji;

                    particle.style.left = `${startX}px`;
                    particle.style.top = `${startY}px`;

                    const angle = Math.random() * Math.PI * 2;
                    const radius = Math.random() * 200 + 100;
                    const finalX = Math.cos(angle) * radius;
                    const finalY = Math.sin(angle) * radius;

                    particle.style.setProperty('--final-x', `${finalX}px`);
                    particle.style.setProperty('--final-y', `${finalY}px`);

                    const duration = Math.random() * 1000 + 1000;
                    const delay = Math.random() * 200;
                    particle.style.animation = `emoji-firework ${duration}ms ${delay}ms ease-out forwards`;

                    header.appendChild(particle);

                    particle.addEventListener('animationend', () => {
                        particle.remove();
                    });
                }
            });
        });
    </script>
</body>
</html>
